<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Verification</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        :root {
            --background-primary: #1e1e1e;
            --background-secondary: #252525;
            --background-secondary-alt: #2a2a2a;
            --text-normal: #dc322f; /* Wait, red? No, let's use standard dark theme colors */
            --text-normal: #dbdbdb;
            --text-muted: #999999;
            --text-accent: #7a55e3;
            --background-modifier-border: #333333;
            --background-modifier-hover: #2e2e2e;
            --background-modifier-accent: #3a3a3a;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-primary);
            color: var(--text-normal);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="visual_bundle.js"></script>
</body>
</html>
